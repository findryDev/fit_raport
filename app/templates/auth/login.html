{% extends "base.html" %}
{% block title %}Logowanie — Fit Raport{% endblock %}
{% block content %}
<div class="auth-box">
    <h1>Logowanie</h1>
    {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
    <form method="post" action="/login" class="entry-form">
        <label>E-mail
            <input type="email" name="email" required autofocus>
        </label>
        <label>Hasło
            <input type="password" name="password" required>
        </label>
        <button type="submit">Zaloguj</button>
    </form>
    <p class="auth-switch">Nie masz konta? <a href="/register">Zarejestruj się</a></p>
</div>
{% endblock %}
